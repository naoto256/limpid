name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsystemd-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release
        run: cargo build --release -p limpid -p limpidctl -p limpid-prometheus --features journal

      - name: Build .deb packages
        run: |
          cargo deb -p limpid --no-build
          cargo deb -p limpid-prometheus --no-build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb
